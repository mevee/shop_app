publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.8.1

dependencies:
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  get: ^4.6.6
  http_parser: ^4.0.2
  get_storage: ^2.1.1
  google_fonts: ^6.1.0
  intl: ^0.20.2
  internet_connection_checker: ^1.0.0+1
  image_picker: ^0.8.9
